name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  lint-and-build-web:
    name: Web - Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint:web
      - run: npm run build:web

  test-api:
    name: API - Tests & Coverage
    runs-on: ubuntu-latest
    env:
      # Isolated SQLite path so the CI runner never races with a host DB file.
      DATABASE_URL: "sqlite:///./_ci_pytest.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: python -m pip install -r apps/api/requirements.txt

      - name: Run API tests with coverage gate
        run: |
          python -m pytest apps/api/tests \
            -v --tb=short \
            --cov --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=35

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: coverage.xml
          if-no-files-found: ignore

  test-worker:
    name: Worker - Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///./_ci_pytest_worker.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: python -m pip install -r apps/api/requirements.txt
      - run: python -m pytest apps/worker/tests -v --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint-and-build-web, test-api]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t a1plus-api:test .

      - name: Build Web image
        run: docker build -f Dockerfile.web -t a1plus-web:test .

  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [docker-build]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Docker Compose
        run: |
          echo "Staging deployment would run here"
          echo "Copy .env.staging, docker compose up -d"

  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [docker-build]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Docker Compose
        run: |
          echo "Production deployment would run here"
          echo "Copy .env.production, docker compose up -d"
