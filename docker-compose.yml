services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: a1plus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    env_file:
      - .env.example
    command: >
      sh -c "pip install -r apps/api/requirements.txt &&
      uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    env_file:
      - .env.example
    command: >
      sh -c "pip install -r apps/api/requirements.txt &&
      python -m apps.worker.main"
    depends_on:
      - postgres
      - redis

  web:
    image: node:24
    working_dir: /workspace
    volumes:
      - ./:/workspace
    env_file:
      - .env.example
    command: >
      sh -c "npm install &&
      npm run dev:web -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:

